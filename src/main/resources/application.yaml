spring:
  application:
    name: pluralit
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  jackson:
    property-naming-strategy: SNAKE_CASE
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  datasource:
    url: jdbc:postgresql://localhost:5432/pluralit
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
      thread-name-prefix: pluralit-async-
  websocket:
    stomp:
      enabled: true

pluralit:
  file-folder: ${FILE_FOLDER:./data/files}
  batch-size: 5

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: when-authorized

info:
  app:
    name: "@project.name@"
    description: "@project.description@"
    version: "@project.version@"
    java:
      version: "@java.version@"
  build:
    artifact: "@project.artifactId@"
    name: "@project.name@"
    description: "@project.description@"
    version: "@project.version@"
    time: "@maven.build.timestamp@"
  developer:
    name: "David Almeida Pitanguy"
    email: "david.pitanguy@gmail.com"
  system:
    java:
      version: "@java.version@"
      vendor: "@java.vendor@"
    os:
      name: "@os.name@"
      version: "@os.version@"
      arch: "@os.arch@"

logging:
  level:
    com.david.pluralit: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
